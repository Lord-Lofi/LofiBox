# LofiBox Head Categories
# Each entry defines a named pool of HeadDatabase heads.
# Terms are matched case-insensitively against each head's name AND tags.
#
# Fields:
#   search:             One term (string) or multiple (list) — union of all matches.
#   random:             true = pull from ALL HDB heads, ignores search.
#   available-from:     MM-DD — start of seasonal window. Omit for year-round.
#   available-to:       MM-DD — end of seasonal window. Dates wrap year-end automatically.
#   double-chance:      0-100 — % chance to give a second bonus head on win.
#   double-chance-from: MM-DD — start of window where double-chance is active. Omit = always active.
#   double-chance-to:   MM-DD — end of window where double-chance is active.
#
# Run /lofibox reload to rebuild pools after editing.

categories:

  # ── Year-round base categories ───────────────────────────────────────────────

  alphanumeric:
    hdb-category: ALPHABET

  animals:
    hdb-category: ANIMALS
    search:
      - "animals"
      - "animal"

  blocks:
    hdb-category: BLOCKS

  decoration:
    hdb-category: DECORATION

  food_and_drink:
    hdb-category: FOOD_DRINKS
    search:
      - "food"
      - "drink"
      - "fruit"
      - "vegetable"
      - "bread"
      - "cake"
      - "pizza"
      - "burger"
      - "sushi"
      - "coffee"
      - "juice"
      - "cooking"

  humanoid:
    hdb-category: HUMANOID

  humans:
    hdb-category: HUMANS
    search:
      - "humans"
      - "human"

  miscellaneous:
    hdb-category: MISCELLANEOUS

  plushie:
    hdb-category: HUMANOID
    search: plushie

  pokemon:
    search: pokemon
    double-chance: 50
    double-chance-from: "02-27"
    double-chance-to: "02-27"

  villager:
    search: villager

  # ── Random — pulls from the entire HDB database ───────────────────────────────

  random:
    random: true

  # ── Pop-culture & themed ──────────────────────────────────────────────────────

  anime:
    search:
      - "naruto"
      - "dragon ball"
      - "one piece"
      - "bleach"
      - "ghibli"
      - "demon slayer"
      - "my hero"
      - "sailor moon"
      - "one punch"
      - "attack on titan"
      - "fairy tail"
      - "fullmetal"
      - "death note"
      - "tokyo ghoul"
      - "jujutsu"
      - "hunter x hunter"
      - "sword art"
      - "re zero"

  star_wars:
    search:
      - "star wars"
      - "starwars"
    double-chance: 50
    double-chance-from: "05-04"
    double-chance-to: "05-04"

  # ── Fantasy & mythology ───────────────────────────────────────────────────────

  fantasy:
    search:
      - "wizard"
      - "witch"
      - "fairy"
      - "elf"
      - "dwarf"
      - "dragon"
      - "potion"
      - "crystal"
      - "rune"
      - "enchanted"
      - "magic"

  mythology:
    search:
      - "mythology"
      - "greek"
      - "norse"
      - "roman"
      - "zeus"
      - "thor"
      - "odin"

  # ── Nature & world ────────────────────────────────────────────────────────────

  animals_wild:
    search:
      - "animal"
      - "wildlife"

  dinosaur:
    search: dinosaur

  insects:
    hdb-category: ANIMALS
    search: insect

  ocean:
    search:
      - "ocean"
      - "sea"
      - "fish"
      - "shark"
      - "whale"
      - "coral"

  plants:
    hdb-category: PLANTS
    search:
      - "plant"
      - "flower"
      - "nature"
      - "tree"
      - "mushroom"

  # ── Space ─────────────────────────────────────────────────────────────────────

  space:
    search:
      - "space"
      - "galaxy"
      - "astronaut"
      - "alien"
      - "planet"
      - "rocket"
      - "cosmos"

  # ── Objects & building ────────────────────────────────────────────────────────

  flags:
    search:
      - "flag"
      - "country"

  furniture:
    search: furniture

  vehicles:
    search:
      - "vehicle"
      - "car"
      - "truck"
      - "train"
      - "boat"
      - "plane"

  # ── Monsters (double-chance during Halloween season) ──────────────────────────

  monsters:
    hdb-category: MONSTERS
    search: monsters
    double-chance: 5
    double-chance-from: "10-01"
    double-chance-to: "11-15"

  # ── Seasonal — Halloween ──────────────────────────────────────────────────────

  halloween:
    search: halloween
    available-from: "10-01"
    available-to: "11-15"

  # ── Seasonal — Christmas & Winter ─────────────────────────────────────────────

  christmas:
    search: christmas
    available-from: "12-01"
    available-to: "01-31"

  winter:
    search: winter
    double-chance: 5
    double-chance-from: "12-01"
    double-chance-to: "01-31"

  # ── Seasonal — Valentine's Day ────────────────────────────────────────────────

  valentine:
    search:
      - "love"
      - "heart"
      - "valentine"
    available-from: "02-01"
    available-to: "02-21"

  # ── Seasonal — Easter ─────────────────────────────────────────────────────────

  easter:
    search: easter
    available-from: "03-20"
    available-to: "04-20"

  # ── Seasonal — St. Patrick's Day ──────────────────────────────────────────────

  st_patricks:
    search:
      - "irish"
      - "clover"
      - "shamrock"
      - "leprechaun"
    available-from: "03-10"
    available-to: "03-20"

  # ── Seasonal — Thanksgiving ───────────────────────────────────────────────────

  thanksgiving:
    search:
      - "thanksgiving"
      - "turkey"
      - "harvest"
      - "pilgrim"
    available-from: "11-15"
    available-to: "11-30"
