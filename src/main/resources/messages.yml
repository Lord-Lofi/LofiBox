# LofiBox Messages — MiniMessage formatting throughout.
prefix: "<gray>[<gradient:#6366f1:#a78bfa>LofiBox</gradient><gray>] "

reload: "<prefix><green>Configuration reloaded."
no-permission: "<prefix><red>You don't have permission to do that."
player-only: "<prefix><red>This command can only be run by a player."
unknown-box: "<prefix><red>Unknown box: <white>{box}<red>."
unknown-player: "<prefix><red>Player <white>{player}<red> not found."
player-not-spinning: "<prefix><red>That player is not currently opening a box."

# Box opening
box-opened: "<prefix><aqua>Opening <white>{box}<aqua>..."
no-box-in-hand: "<prefix><red>You aren't holding a mystery box."
already-spinning: "<prefix><red>You are already opening a box!"

# Key system
key-required: "<prefix><red>This box requires a <white>{key}<red> to open."
key-consumed: "<prefix><gray>Your <white>{key}<gray> was consumed."

# Vault cost
vault-unavailable: "<prefix><red>Economy is not available on this server."
vault-insufficient-funds: "<prefix><red>You need <white>{cost}<red> to open this box. <dark_gray>(balance: {balance})"
vault-charged: "<prefix><gray>You were charged <white>{cost}<gray>."

# Reward won
reward-won: "<newline><gradient:#6366f1:#a78bfa>  ✦ Congratulations! ✦</gradient><newline>  <gray>You won <white>{reward}<gray> from <white>{box}<gray>!<newline>"

# Server-wide broadcast when a player wins a HeadDatabase head reward.
# {player} = player name, {head} = plain-text head name
head-found-broadcast: "<gradient:#6366f1:#a78bfa>{player}</gradient> <gray>found a <white>{head}<gray>!"
head-double-reward: "<gradient:#f59e0b:#fbbf24>✦ BONUS!</gradient> <gradient:#6366f1:#a78bfa>{player}</gradient> <gray>also received a bonus <white>{head}<gray>!"

# Inventory full
inventory-full: "<prefix><yellow>Your inventory was full — your reward dropped at your feet."

# Give command
give-success: "<prefix><green>Gave <white>{amount}x {box}<green> to <white>{player}<green>."
give-received: "<prefix><green>You received <white>{amount}x {box}<green>."

# Stats
stats-header: "<newline><gradient:#6366f1:#a78bfa>  LofiBox Stats — {player}</gradient>"
stats-line: "  <gray>{box}: <white>{count} <gray>opened"
stats-footer: " "
stats-none: "<prefix><gray>No boxes opened yet."

# List
list-header: "<newline><gradient:#6366f1:#a78bfa>  Available Boxes</gradient>"
list-line: "  <gray>- <white>{box} <dark_gray>({id})"
list-footer: " "

# Preview GUI title
preview-title: "<dark_purple>Preview: {box}"

# Admin editor
editor-input-prompt: "<prefix><aqua>Chat input required: <white>{prompt}"
editor-input-cancel: "<prefix><gray>Type <white>cancel<gray> to abort."
editor-box-id-taken: "<prefix><red>A box with ID '<white>{id}<red>' already exists."
editor-save-success: "<prefix><green>Box '<white>{box}<green>' saved and reloaded."
editor-save-error: "<prefix><red>Could not save: <white>{error}"
editor-deleted: "<prefix><yellow>Box '<white>{box}<yellow>' deleted."
editor-hold-item: "<prefix><red>Pick up an item onto your cursor first, then click the slot."
editor-invalid-number: "<prefix><red>That is not a valid number."
editor-shift-to-delete: "<prefix><red>Shift-click to confirm deletion."
editor-reward-no-item: "<prefix><red>Set the reward item before saving."
