name: LofiBox
version: '${project.version}'
main: dev.lofibox.LofiBox
api-version: '1.21'
description: A configurable mystery box / crate plugin.
authors: [ Lord-Lofi ]

softdepend:
  - PlaceholderAPI
  - HeadDatabase
  - LuckPerms
  - Vault
  - Essentials
  - EssentialsDiscord

commands:
  lofibox:
    description: Main LofiBox command.
    aliases: [ mb, crate, lbox ]
    usage: /lofibox <open|give|preview|list|stats|redeem|reload>

permissions:
  lofibox.admin:
    description: Full admin access.
    default: op
  lofibox.use:
    description: Open boxes and view previews.
    default: true
  lofibox.give:
    description: Give box items to players.
    default: op
  lofibox.reload:
    description: Reload configs.
    default: op
  lofibox.stats:
    description: View your own stats GUI via /lofibox stats.
    default: false
  lofibox.stats.others:
    description: View another player's stats (also opens GUI for them when run as console).
    default: op
  lofibox.bypass:
    description: Bypass permission-gated rewards.
    default: op
  lofibox.editor:
    description: Open the in-game box editor GUI.
    default: op
  lofibox.redeem:
    description: Open the pending rewards redemption GUI.
    default: true
