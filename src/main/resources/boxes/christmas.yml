# Seasonal: head pool active December 1 through January 31.
# The Christmas head reward falls back to a Snow Block outside that window.
name: "<gradient:#ef4444:#22c55e>✦ Christmas Crate ✦</gradient>"

item:
  material: SNOW_BLOCK
  name: "<gradient:#ef4444:#22c55e>✦ Christmas Crate ✦</gradient>"
  lore:
    - ""
    - "<gray>Right-click to open!"
    - "<dark_gray>Seasonal: December — January"

sounds:
  win: "block.note_block.chime"

rewards:

  christmas_head:
    weight: 40
    display-name: "<gradient:#ef4444:#22c55e>Mystery Christmas Head"
    item:
      head-database-category: "christmas"
      material: SNOW_BLOCK
      name: "<gradient:#ef4444:#22c55e>Mystery Christmas Head"
    actions:
      - "[message] <gradient:#ef4444:#22c55e>You found a Mystery Christmas Head!"

  snowball:
    weight: 30
    display-name: "<white>Snowball x16"
    item:
      material: SNOWBALL
      name: "<white>Snowball"
      amount: 16
    actions:
      - "[message] <white>You received 16 Snowballs."

  cookie:
    weight: 20
    display-name: "<yellow>Cookie x8"
    item:
      material: COOKIE
      name: "<yellow>Cookie"
      amount: 8
    actions:
      - "[message] <yellow>You received 8 Cookies!"

  firework:
    weight: 10
    display-name: "<red>Firework Rocket"
    item:
      material: FIREWORK_ROCKET
      name: "<red>Firework Rocket"
    actions:
      - "[message] <red>You received a Firework Rocket!"
